<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="64" height="64"> <defs> <!-- 磨砂玻璃阴影滤镜 --> <filter id="glass-shadow" x="-10%" y="-10%" width="120%" height="120%"> <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.15" /> </filter> </defs> <!-- 磨砂玻璃背景 --> <rect x="6" y="6" width="84" height="84" rx="20" fill="rgba(255, 255, 255, 0.4)" filter="url(#glass-shadow)" /> <rect x="6" y="6" width="84" height="84" rx="20" fill="none" stroke="rgba(255, 255, 255, 0.7)" stroke-width="2" /> <!-- H：活力粉红（插画风格阴影 + 主体） --> <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"> <!-- H 的阴影 --> <g stroke="rgba(0, 0, 0, 0.15)" transform="translate(4, 6)"> <line x1="20" y1="24" x2="20" y2="72" /> <line x1="44" y1="24" x2="44" y2="72" /> <line x1="20" y1="48" x2="44" y2="48" /> </g> <!-- H 的主体 --> <g stroke="#FF4D6D"> <line x1="20" y1="24" x2="20" y2="72" /> <line x1="44" y1="24" x2="44" y2="72" /> <line x1="20" y1="48" x2="44" y2="48" /> </g> <!-- H 的内侧高光，增强立体感 --> <g stroke="rgba(255, 255, 255, 0.4)" stroke-width="4"> <line x1="20" y1="28" x2="20" y2="68" /> <line x1="44" y1="28" x2="44" y2="68" /> </g> </g> <!-- 2：活力琥珀金（插画风格阴影 + 主体） --> <!-- 2 的阴影 --> <path d="M 52 36 Q 52 24 62 24 Q 72 24 72 36 Q 72 48 56 68 L 72 68" fill="none" stroke="rgba(0, 0, 0, 0.15)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" transform="translate(4, 6)" /> <!-- 2 的主体 --> <path d="M 52 36 Q 52 24 62 24 Q 72 24 72 36 Q 72 48 56 68 L 72 68" fill="none" stroke="#FFB703" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" /> <!-- 2 的内侧高光 --> <path d="M 54 34 Q 54 26 62 26 Q 70 26 70 34 Q 70 44 58 64 L 70 64" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" /> <!-- O：活力绿松石（插画风格阴影 + 主体） --> <g fill="none" stroke-linecap="round" stroke-linejoin="round"> <!-- O 的阴影 --> <rect x="74" y="28" width="14" height="40" rx="7" stroke="rgba(0, 0, 0, 0.15)" stroke-width="14" transform="translate(4, 6)" /> <!-- O 的主体 --> <rect x="74" y="28" width="14" height="40" rx="7" stroke="#06D6A0" stroke-width="14" /> <!-- O 的内侧高光 --> <rect x="76" y="30" width="10" height="36" rx="5" stroke="rgba(255, 255, 255, 0.4)" stroke-width="4" /> </g></svg>